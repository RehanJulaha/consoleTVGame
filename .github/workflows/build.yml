name: Build Android APKs

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        id: android
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: r26c
          emulator: false

      - name: Create local.properties
        run: |
          echo "sdk.dir=${{ steps.android.outputs.sdk-path }}" > local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Console APK (Android TV)
        run: ./gradlew :console:assembleDebug --no-daemon -x lint

      - name: Build Controller APK (Phone)
        run: ./gradlew :controller:assembleDebug --no-daemon -x lint

      - name: Upload Console APK
        uses: actions/upload-artifact@v4
        with:
          name: console-debug-apk
          path: console/build/outputs/apk/debug/console-debug.apk
          retention-days: 7

      - name: Upload Controller APK
        uses: actions/upload-artifact@v4
        with:
          name: controller-debug-apk
          path: controller/build/outputs/apk/debug/controller-debug.apk
          retention-days: 7

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            console/build/outputs/apk/debug/console-debug.apk
            controller/build/outputs/apk/debug/controller-debug.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}